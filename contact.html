    <main class="inner-page">
        <div class="page-content">
            <h1 class="page-title">Contact</h1>
            <div class="contact-content">
                <h2>Get in Touch</h2>
                <p>I'd love to hear from you. Whether you have a question about my research, want to collaborate, or just want to connect, feel free to reach out.</p>

                <form class="contact-form" onsubmit="event.preventDefault(); alert('Thank you for your message!');">
                    <div>
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div>
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div>
                        <label for="subject">Subject</label>
                        <input type="text" id="subject" name="subject">
                    </div>
                    <div>
                        <label for="message">Message</label>
                        <textarea id="message" name="message" required></textarea>
                    </div>
                    <button type="submit">Send</button>
                </form>
            </div>
        </div>
    </main>
